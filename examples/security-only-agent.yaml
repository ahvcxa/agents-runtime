# ─────────────────────────────────────────────────────────────
# TEMPLATE: Security Only Agent
# Role      : Specialized Security Auditor
# Auth Level: 1 — strict read-only access
# Use case  : Automated deep vulnerability scans before deploy
# ─────────────────────────────────────────────────────────────
agent:
  id: "security-auditor-01"
  role: "Observer"
  skill_set:
    - "security-audit"
  authorization_level: 1
  read_only: true
  read_paths:
    - "src/"
    - "package.json"
    - "package-lock.json"
