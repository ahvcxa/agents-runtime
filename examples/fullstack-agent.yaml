# ─────────────────────────────────────────────────────────────
# TEMPLATE: Fullstack Executor Agent
# Role      : Multi-domain developer (Read + Write)
# Auth Level: 2 — all standard skills
# Use case  : Fullstack tasks covering frontend, backend, and config
# ─────────────────────────────────────────────────────────────
agent:
  id: "fullstack-executor"
  role: "Executor"
  skill_set:
    - "code-analysis"
    - "refactor"
    - "security-audit"
  authorization_level: 2
  read_only: false
  read_paths:
    - "src/frontend/"
    - "src/backend/"
    - "config/"
    - "package.json"
