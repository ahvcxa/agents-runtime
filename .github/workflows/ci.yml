name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Check for syntax errors
        run: |
          node --check bin/agents.js
          node --check bin/mcp.js
          for f in src/*.js src/**/*.js; do
            [ -f "$f" ] && node --check "$f"
          done

  smoke-test:
    name: Smoke Test (CLI)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Install template into test project
        run: |
          mkdir -p /tmp/ci-test-project
          bash setup-agents.sh /tmp/ci-test-project
          ls /tmp/ci-test-project/.agents/

      - name: agents list
        run: node bin/agents.js list --project /tmp/ci-test-project

      - name: agents check (observer)
        run: |
          node bin/agents.js check \
            --config examples/observer-agent.yaml \
            --project /tmp/ci-test-project

      - name: agents run (code-analysis on src/)
        run: |
          node bin/agents.js run \
            --config examples/observer-agent.yaml \
            --skill code-analysis \
            --input "{\"files\":[\"src/\"],\"project_root\":\"$(pwd)\"}" \
            --project /tmp/ci-test-project 2>&1 | grep -E '(Status:|files_scanned|findings)'
