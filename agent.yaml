agent:
  id: "observer-01"
  role: "Observer"
  skill_set:
    - "code-analysis"
    - "security-audit"
  authorization_level: 1
  read_only: true
  read_paths:
    - "src/"
    - "bin/"
    - "template/"
    - "examples/"
